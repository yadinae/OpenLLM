models:
  - name: "groq/llama-3.3-70b-versatile"
    protocol: "openai"
    endpoint: "https://api.groq.com/openai/v1"
    api_key: "${GROQ_API_KEY}"
    enabled: true
    rpm: 30
    tpm: 6000
    max_concurrent: 10
    daily_limit: 1000
    quality_weight: 0.4
    speed_weight: 0.3
    context_weight: 0.2
    reliability_weight: 0.1
    max_context_length: 131072
    capabilities: ["text", "coding"]

